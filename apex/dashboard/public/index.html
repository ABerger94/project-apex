<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>APEX V2 Command Center</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Trustworthy Self-Improvement</p>
          <h1>APEX V2 Command Center</h1>
        </div>
        <button id="refreshBtn" type="button">Refresh</button>
      </header>

      <section class="metrics" aria-label="Project state">
        <article>
          <span>Target</span>
          <strong id="targetLevel">L5</strong>
        </article>
        <article>
          <span>Branch</span>
          <strong id="branch">--</strong>
        </article>
        <article>
          <span>Tracked Files</span>
          <strong id="trackedFiles">--</strong>
        </article>
        <article>
          <span>Working Tree</span>
          <strong id="workingTree">--</strong>
        </article>
        <article>
          <span>Planner</span>
          <strong id="plannerModel">--</strong>
        </article>
      </section>

      <section class="panel objective-panel">
        <div class="panel-head">
          <h2>Objective</h2>
          <span id="stateSource" class="muted"></span>
        </div>
        <p id="objectiveText"></p>
        <div id="levelList" class="level-list"></div>
      </section>

      <section class="panel command-panel">
        <div class="panel-head">
          <h2>Cycle Command</h2>
          <span id="phaseLabel" class="muted">Idle</span>
        </div>
        <div class="command-grid">
          <div class="workflow-wheel" aria-label="Manual cycle workflow">
            <div class="phase-node" data-phase="context-intake"><span>1</span><strong>Context</strong></div>
            <div class="phase-node" data-phase="self-read"><span>2</span><strong>Self-Read</strong></div>
            <div class="phase-node" data-phase="plan-proposal"><span>3</span><strong>Plan</strong></div>
            <div class="phase-node" data-phase="human-review"><span>4</span><strong>Review</strong></div>
            <div class="phase-node" data-phase="execute"><span>5</span><strong>Execute</strong></div>
            <div class="phase-node" data-phase="test"><span>6</span><strong>Test</strong></div>
            <div class="phase-node" data-phase="commit-or-rollback"><span>7</span><strong>Commit/Rollback</strong></div>
          </div>
          <div class="manual-controls">
            <label for="goalInput">Cycle Goal</label>
            <textarea id="goalInput" rows="4" placeholder="Describe the single highest-leverage improvement to plan."></textarea>
            <div class="button-row">
              <button id="generatePlanBtn" type="button">Generate Plan</button>
              <button id="runPlanBtn" type="button" disabled>Approve / Run</button>
              <button id="clearPlanBtn" class="secondary" type="button" disabled>Clear</button>
            </div>
            <p id="commandMessage" class="muted"></p>
            <dl id="plannerDetails" class="planner-details"></dl>
            <div id="pendingPlan" class="pending-plan"></div>
          </div>
        </div>
      </section>

      <section class="layout">
        <div class="main-column">
          <section class="panel">
            <div class="panel-head">
              <h2>Manual Cycles</h2>
              <span id="cycleCount" class="muted"></span>
            </div>
            <div id="cycles" class="cycles"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>Event Log</h2>
              <span class="muted">memory/events.jsonl</span>
            </div>
            <div id="events" class="events"></div>
          </section>
        </div>

        <aside class="side-column">
          <section class="panel">
            <div class="panel-head">
              <h2>Recent Commits</h2>
            </div>
            <div id="commits" class="commits"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>Working Tree</h2>
            </div>
            <pre id="status" class="status"></pre>
          </section>
        </aside>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
